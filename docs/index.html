<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { 
  overflow: auto; 
}

.row {
  flex-wrap: nowrap !important;
}

.container-fluid {
  min-width: 1200px;
  min-height: 800px;
}

.canvas {
  position: relative;
  width: 100%;
  height: 100%;
  max-width: 900px;
  margin: auto;
  aspect-ratio: 16 / 9;
}

.canvas img {
  width: 100%;
  height: auto;
  display: block;
}

.bg-layer {
  background: lightgray;
  border-radius: 6px;
  height: 700px;
}

.node {
  position: absolute;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #2563eb;
  color: white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  cursor:pointer;
  transform: translate(-50%, -50%);
  transition: 0.2s;
}

.node:hover {
  transform: translate(-50%, -50%) scale(1.15);
}

.node.active {
  background: #0f172a;
  box-shadow: 0 0 0 4px rgba(37,99,235,0.3);
}

#stepList {
  max-height: 250px;
}

.list-group-item.active {
  background-color: #0f172a;
  border-color: #0f172a;
}
</style>
</head>

<body class="vh-100 d-flex flex-column">

<div class="container-fluid flex-grow-1 d-flex flex-column align-items-center pt-3">

  <!-- HEADER -->
  <div class="w-100 mb-2 px-3 py-2 rounded-3 d-flex align-items-center"
     style="width:100%; background:#0f172a; color:white;">

  <div class="me-2"
       style="width:8px; height:8px; background:#2563eb; border-radius:50%;">
  </div>

  <div class="fw-semibold" style="font-size:0.95rem;">
    PyAnalySeries Demo Tour
  </div>

  </div>

  <!-- MAIN -->
  <div class="row w-100 align-items-start">

    <!-- LEFT -->
    <div class="col-7 d-flex align-items-start justify-content-center">

	<div class="canvas">
	
                <div class="bg-layer"></div>

		<!-- image principale -->
	        <img src="captures/capture_01.png" style="position:absolute; inset:0; width:100%; height:100%; object-fit:contain;">
	
	        <!-- overlay -->
	        <img src="captures/c1.png" style="position:absolute; top:32%; left:12%; width:80%; pointer-events:none;">
	
	        <!-- nodes -->
	        <div class="node" style="top:101%; left:23.7%;" data-step="0">1</div>
	        <div class="node" style="top:61.2%; left:27%;" data-step="1">2</div>
	        <div class="node" style="top: 80%;left: 31.7%;" data-step="2">3</div>
	        <div class="node" style="top: 90%;left: 38%;" data-step="3">4</div>
	        <div class="node" style="top: 77%;left:45%;" data-step="4">5</div>
	        <div class="node" style="top: 91%;left: 51%;" data-step="5">6</div>
	        <div class="node" style="top: 77%;left: 57%;" data-step="6">7</div>
	        <div class="node" style="top: 103%;left: 64%;" data-step="7">8</div>
	        <div class="node" style="top: 70%;left: 69%;" data-step="8">9</div>
	        <div class="node active" style="top: 84%;left: 76%;" data-step="9">10</div>
	        <div class="node" style="top: 70%;left: 81.5%;" data-step="10">11</div>

	</div>

    </div>

    <!-- RIGHT -->
    <div class="col-5 d-flex flex-column">

      <!-- PLAYER -->
      <div class="pt-0 px-3 pb-3">
	<video id="player" class="w-100 rounded" controls
	       style="aspect-ratio:16/9; background:black;">
	
	  <source id="source" src="videos/01.mp4">
	
	  <track id="track"
	         kind="subtitles"
	         src="videos/01.vtt"
	         srclang="en"
	         label="English"
	         default>
	
	</video>
      </div>

      <!-- TEXT -->
      <div class="p-3">
        <h5 id="title">Step 1</h5>
        <p id="description" class="text-muted">Description</p>
      </div>

      <!-- STEP LIST -->
      <div class="p-3 flex-grow-1 overflow-auto" id="stepList">
        <ul class="list-group" id="stepsContainer"></ul>
      </div>

    </div>

  </div>
</div>

<script>

const steps = [
  {
    title: "Display a series",
    description: "Display a series, zoom, pan, change axis, autoscale",
    file: "videos/01_display_single_series.mp4"
  },
  {
    title: "Define interpolation",
    description: "Define tie-points between series",
    file: "videos/02_interpolation_define.mp4"
  },
  {
    title: "Apply interpolation",
    description: "Apply interpolation on series",
    file: "videos/03_interpolation_apply.mp4"
  },
  {
    title: "Display multiple series",
    description: "Display multiple series together or stacked",
    file: "videos/04_display_multiple_series.mp4"
  },
  {
    title: "X-Domain Filter",
    description: "Smoothing Average",
    file: "videos/05_smoothing_average.mp4"
  },
  {
    title: "Resampling",
    description: "Resample and integration",
    file: "videos/06_resampling.mp4"
  },
  {
    title: "Frequency-Domain Filter",
    description: "Explore various filtering methods",
    file: "videos/07_filtering.mp4"
  },
  {
    title: "Power Spectrum Density (PSD)",
    description: "Explore various estimations of PSD",
    file: "videos/08_PSD.mp4"
  },
  {
    title: "Insolation",
    description: "Generate astronomomical and insolation series",
    file: "videos/09_insolation.mp4"
  },
  {
    title: "Import / Export",
    description: "Import your data from a spreadsheet",
    file: "videos/10_import.mp4"
  },
  {
    title: "Installation",
    description: "How to install the application",
    file: "videos/11_installation.mp4"
  }
];

const player = document.getElementById("player");
const source = document.getElementById("source");
const track = document.getElementById("track");
const stepsContainer = document.getElementById("stepsContainer");

let currentStep = 0;

// Build list
steps.forEach((s, i) => {
  const li = document.createElement("li");
  li.className = "list-group-item list-group-item-action";
  li.dataset.step = i;
  li.innerHTML = `<strong>${i+1}. ${s.title}</strong><br><small>${s.description}</small>`;

  li.addEventListener("click", () => loadStep(i));
  stepsContainer.appendChild(li);
});

// Load step
function loadStep(i) {
  currentStep = i;
  const s = steps[i];

  document.getElementById("title").textContent = s.title;
  document.getElementById("description").textContent = s.description;

  source.src = s.file;
  track.src = s.file.replace('.mp4', '.vtt');

  player.load();

  // nodes
  document.querySelectorAll(".node").forEach((n, idx) => {
    n.classList.toggle("active", idx === i);
  });

  // list
  document.querySelectorAll("#stepsContainer li").forEach((li, idx) => {
    li.classList.toggle("active", idx === i);
  });

  // scroll
  const activeItem = document.querySelector("#stepsContainer li.active");
  if (activeItem) {
    activeItem.scrollIntoView({
      behavior: "smooth",
      block: "nearest"
    });
  }
}

// Node click
const nodes = document.querySelectorAll(".node");
nodes.forEach(node => {
  node.addEventListener("click", () => {
    loadStep(Number(node.dataset.step));
  });
});

// Init
loadStep(0);

</script>

</body>
</html>
